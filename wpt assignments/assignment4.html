<!DOCTYPE html>
<html>
<head>
<title>Show Headings and Mouse Position</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

    $("#b1").click(function(){
        $("#d1").show();
    });
    $("#b2").click(function(){
        $("#d1").hide();
});
   
});
</script>

</head>
<body>

<button id="b1">show</button>
<button id="b2">hide</button>
<div id="d1">
<h1>Heading 1</h1>
<h2>Heading 2</h2>
<h3>Heading 3</h3>
</div>


</body>
</html>
